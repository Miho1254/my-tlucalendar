name: tlucalendar
description: "TLU Calendar for Thuy Loi University's students - free, open source, no ads"
publish_to: "none"
version: 2026.07.03

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  http: ^1.6.0
  dio: ^5.9.2
  sqlite3: ^3.2.0
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.2
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  android_intent_plus: ^6.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  android_alarm_manager_plus: ^5.0.0 # For exact daily alarms
  fluttertoast: ^9.0.0 # For toast messages
  flutter_secure_storage: ^10.0.0 # For encrypted credential storage
  encrypt: ^5.0.3 # For additional encryption
  dartz: ^0.10.1
  get_it: ^9.2.1
  equatable: ^2.0.8
  shimmer: ^3.0.0
  lottie: ^3.3.2
  flutter_staggered_animations: ^1.1.1
  table_calendar: ^3.2.0
  intl: ^0.20.2
  ffi: ^2.2.0
  share_plus: ^12.0.2
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  device_calendar: ^4.3.3
  dio_smart_retry: ^7.0.1
  brotli: ^0.6.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.1.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  forui: ^0.23.0
  google_fonts: ^6.2.1
  device_preview: ^1.3.1
  flutter_localizations:
    sdk: flutter
  fl_chart: ^1.2.0
  liquid_glass_nav: ^1.0.1

dependency_overrides:
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/today.webp
    - assets/today_dark.webp
    - assets/logo.png
