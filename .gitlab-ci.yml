image: ghcr.io/cirruslabs/flutter:stable 

stages:
  - build
  - release

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[release\]/

build_all:
  stage: build
  tags:
    - docker
  before_script:
    - mkdir -p android
    - echo "$KEYSTORE_BASE64" | base64 -d > android/rel.jks
    - echo "$OLD_KEYSTORE_BASE64" | base64 -d > android/old.jks
    - echo "$LINEAGE_BASE64" | base64 -d > android/my.lineage
    - echo "$GOOGLE_SERVICES_BASE64" | base64 -d > android/app/google-services.json
    - yes | sdkmanager --licenses || true
  script:
    - |
      set -e

      # Print debug
      flutter doctor -v

      # Update dependencies
      flutter pub get

      # --- VẢ THÊM ĐOẠN NÀY ---
      echo "Cleaning native build cache..."
      rm -rf android/.cxx
      rm -rf build/
      rm -rf android/app/build/
      # ------------------------
      # 3. Build APK
      flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

      # 4. Sign APK with Key Rotation (V3)
      APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
      echo "Using apksigner at: $APKSIGNER"
      
      $APKSIGNER sign \
        --ks android/old.jks \
        --ks-key-alias "$KEY_ALIAS" \
        --ks-pass "pass:$STORE_PASSWORD" \
        --key-pass "pass:$KEY_PASSWORD" \
        --next-signer \
        --ks android/rel.jks \
        --ks-key-alias "$KEY_ALIAS" \
        --ks-pass "pass:$STORE_PASSWORD" \
        --key-pass "pass:$KEY_PASSWORD" \
        --lineage android/my.lineage \
        --v1-signing-enabled true \
        --v2-signing-enabled true \
        --v3-signing-enabled true \
        build/app/outputs/flutter-apk/app-release.apk

      # 5. Build App Bundle (Dùng Old Key cho Play Store)
      cp android/old.jks android/rel.jks
      flutter build appbundle --release --obfuscate --split-debug-info=build/app/outputs/symbols

      # 6. Setting up Release version
      export REL_TIME=$(date +"%Y.%m.%d_%H-%M")
      export REL_TAG="release_$REL_TIME"
      echo "REL_TAG=$REL_TAG" >> build.env
      echo "BUILD_JOB_ID=$CI_JOB_ID" >> build.env
      
      # 7. Rename file to avoid duplication
      mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/TLU-Calendar-$REL_TAG.apk
      mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/TLU-Calendar-$REL_TAG.aab

  artifacts:
    reports:
      dotenv: build.env
    paths:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    expire_in: never

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - docker
  needs:
    - job: build_all
      artifacts: true
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Creating release for TLU Calendar $REL_TAG from Build Job $BUILD_JOB_ID..."

    # --- SOẠN TIN NHẮN TELEGRAM ---
    - |
      MSG="📅 *TLU CALENDAR UPDATE!* %0A%0A📦 *Version:* \`$REL_TAG\` %0A⏰ *Time:* $REL_TIME %0A💻 *Built on:* Runner i5-12400F (WSL2) %0A%0A🔗 *DOWNLOAD LINKS:* %0A👉 [Download APK (V3 Signed)]($CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID/artifacts/raw/build/app/outputs/flutter-apk/TLU-Calendar-$REL_TAG.apk) %0A👉 [Download AAB (Play Store)]($CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID/artifacts/raw/build/app/outputs/bundle/release/TLU-Calendar-$REL_TAG.aab)"
    
    # --- BẮN TELEGRAM ---
    - |
      curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
      -d chat_id="$TELEGRAM_CHAT_ID" \
      -d text="$MSG" \
      -d parse_mode="Markdown" \
      -d disable_web_page_preview="true"
      
    # --- BẮN PUSH NOTIFICATION (FCM) THEO TOPIC APK ---
    - |
      FCM_BODY="Đã có bản phát hành $REL_TAG! Bấm vào đây để tải và cài đặt ngay!"
      curl -s -X POST "$FCM_BACKEND_URL/api/notifications/topic" \
      -H "Content-Type: application/json" \
      -d '{
            "target_topic": "apk_users",
            "title": "Bản cập nhật TLU Calendar Mới!",
            "body": "'"$FCM_BODY"'",
            "data": { "action": "update" }
          }'
  release:
    name: "TLU Calendar $REL_TAG"
    description: "Bản build tự động cho TLU Calendar với V3 Signing Rotation"
    tag_name: "$REL_TAG"
    ref: '$CI_COMMIT_SHA'
    assets:
      links:
        - name: "Download APK (V3 Signed)"
          url: "https://gitlab.com/$CI_PROJECT_PATH/-/jobs/$BUILD_JOB_ID/artifacts/raw/build/app/outputs/flutter-apk/TLU-Calendar-$REL_TAG.apk"
        - name: "Download AAB (Play Store)"
          url: "https://gitlab.com/$CI_PROJECT_PATH/-/jobs/$BUILD_JOB_ID/artifacts/raw/build/app/outputs/bundle/release/TLU-Calendar-$REL_TAG.aab"