name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: "contains(github.event.head_commit.message, '[release]')"
    name: Build signed Android release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache Gradle & Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-pub-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-pub-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Read app version
        id: version
        run: |
          VERSION="$(awk '/^version:/ {print $2; exit}' pubspec.yaml | tr -d '[:space:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          # Generate version: YYMMDD.HHmm (valid Flutter format)
          TIMESTAMP="$(date -u +%y%m%d.%H%M)"
          echo "old_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "tag=v${TIMESTAMP}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Bump version in pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}/" pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Decode release keystore
        run: |
          test -n "${KEYSTORE_BASE64}" || (echo "Missing KEYSTORE_BASE64 secret" && exit 1)
          echo "${KEYSTORE_BASE64}" | base64 --decode > android/rel.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build APK (Release)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/tlu-calendar-${{ steps.version.outputs.version }}.apk"
          cd dist
          sha256sum "tlu-calendar-${{ steps.version.outputs.version }}.apk" > "tlu-calendar-${{ steps.version.outputs.version }}.apk.sha256"

      - name: Write release notes
        run: |
          {
            echo "## TLU Calendar ${{ steps.version.outputs.version }}"
            echo
            echo "### Install"
            echo "Download the APK below and install it on Android. If Android blocks the install, allow installs from your browser or file manager, then retry."
            echo
            echo "### Verify"
            echo "A SHA-256 checksum is attached next to the APK:"
            echo
            echo '```text'
            cat "dist/tlu-calendar-${{ steps.version.outputs.version }}.apk.sha256"
            echo '```'
            echo
            echo "### Source"
            echo 'This release is built from commit `${{ steps.version.outputs.short_sha }}`. GitHub also attaches the source archive for this tag.'
            echo
            echo "### Changes"
            echo "This release enables GitHub-generated release notes for repository changes."
          } > RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "TLU Calendar ${{ steps.version.outputs.version }}"
          files: |
            dist/tlu-calendar-${{ steps.version.outputs.version }}.apk
            dist/tlu-calendar-${{ steps.version.outputs.version }}.apk.sha256
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
