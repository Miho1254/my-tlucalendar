name: Build & Release in Main branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: "contains(github.event.head_commit.message, '[release]')"
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache Gradle & Pub
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-pub-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-pub-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Fetch Crashpad Sources
        run: |
          chmod +x android/app/src/main/cpp/init_crashpad_source.sh
          ./android/app/src/main/cpp/init_crashpad_source.sh

      - name: Generate Temporary Keystore
        run: |
          keytool -genkey -v -keystore android/rel.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-key-alias -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" -storepass android -keypass android

      - name: Build APK (Release)
        env:
          KEY_ALIAS: my-key-alias
          KEY_PASSWORD: android
          STORE_PASSWORD: android
        run: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Generate Release Tag
        id: tag
        run: |
          echo "release_tag=release_$(date +"%Y.%m.%d_%H-%M")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Bản phát hành mới: ${{ steps.tag.outputs.release_tag }}"
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
